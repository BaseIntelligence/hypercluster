# Local challenge-only compose (not Swarm). Host map stays in mission band.
services:
  hypercluster:
    image: hypercluster:m1-scaffold
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3250:8000"
    environment:
      CHALLENGE_HOST: "0.0.0.0"
      CHALLENGE_PORT: "8000"
      CHALLENGE_DATABASE_URL: "sqlite+aiosqlite:////data/challenge.sqlite3"
      # Provide via env file or shell; never commit real tokens.
      CHALLENGE_SHARED_TOKEN: "${CHALLENGE_SHARED_TOKEN:-dev-compose-token}"
      CHALLENGE_SHARED_TOKEN_FILE: ""
    volumes:
      - hypercluster-data:/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import json, urllib.request; data=json.load(urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)); raise SystemExit(0 if data.get('status') == 'ok' else 1)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  hypercluster-data:
    name: hypercluster-m1-data
